<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pointercancel demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    #stage {
      width: 360px;
      height: 180px;
      display: grid;
      place-items: center;
      border: 2px solid #dc2626;
      border-radius: 16px;
      background: #fef2f2;
      touch-action: pan-y;
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>pointercancel demo</h1>
  <div id="stage">在觸控裝置上滑動，觀察取消情況</div>
  <pre id="log">尚未取消</pre>

  <script>
    const stage = document.getElementById('stage')
    const log = document.getElementById('log')
    let dragging = false

    function reset(reason) {
      dragging = false
      log.textContent = `狀態已清理：${reason}`
    }

    stage.addEventListener('pointerdown', (event) => {
      dragging = true
      stage.setPointerCapture(event.pointerId)
      log.textContent = '已開始，等待 pointerup 或 pointercancel'
    })

    stage.addEventListener('pointerup', () => reset('pointerup'))
    stage.addEventListener('pointercancel', () => reset('pointercancel'))
  </script>
</body>
</html>
